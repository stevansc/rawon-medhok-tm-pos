<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rawon TM POS</title>
    <!-- Conditionally inject PWA Manifest and iOS tags for Staff apps only -->
    <script>
      if (!window.location.pathname.startsWith('/customer')) {
        var manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        manifestLink.href = '/manifest.webmanifest';
        document.head.appendChild(manifestLink);

        var iosMeta = document.createElement('meta');
        iosMeta.name = 'apple-mobile-web-app-capable';
        iosMeta.content = 'yes';
        document.head.appendChild(iosMeta);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
